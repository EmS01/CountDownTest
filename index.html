<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
p {
  text-align: center;
  font-family: arial;
  font-size: 60px;
  margin-top: 50px;
  color: white;
  font-weight: bold;
}

h2{
  text-align: center;
  font-family: arial;
  font-size: 30px;
  margin-top: 100px;
  color: white;
  font-weight: bold;
}
  
body {
  background-image: url('https://www.teahub.io/photos/full/358-3586503_10-hd-los-angeles-wallpapers-data-src-large.jpg');
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: 100% 100%;
}
</style>
</head>
<body>
 
<h2>"Doubt that the stars are fire, Doubt that the sun doth move his aides, Doubt truth to be a liar, But never doubt I love." (Hamlet – Act 2, Scene 2)</h2>

<p id="demo"></p>

<script>
var countDownDate = new Date("Aug 5, 2022 15:37:25").getTime();

var x = setInterval(function() {

  var now = new Date().getTime();
    
  var distance = countDownDate - now;
    
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);
    
  document.getElementById("demo").innerHTML = days + " days " + hours + " hours "
  + minutes + "m " + seconds + " s ";
    
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("demo").innerHTML = "EXPIRED";
  }
}, 1000);
</script>

</body>
</html>
